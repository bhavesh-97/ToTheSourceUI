<div class="card">
  <p-table #dt
           [value]="careers"
           dataKey="CareerID"
           [rows]="10"
           [rowsPerPageOptions]="[10, 25, 50]"
           [loading]="loading"
           [paginator]="true"
           [globalFilterFields]="['Title', 'Department', 'Location']"
           [showGridlines]="true"
           styleClass="p-datatable-sm">

    <ng-template pTemplate="caption">
      <div class="table-header">
        <h1>Career Master</h1>
        <div class="header-actions">
          <p-button label="Add New Job" icon="pi pi-plus" class="p-button-success" (click)="openNew()">
          </p-button>
        </div>
      </div>
      <div class="search-row">
        <p-iconField iconPosition="left" class="ml-auto">
          <p-inputIcon>
            <i class="pi pi-search"></i>
          </p-inputIcon>
          <input pInputText
                 type="text"
                 (input)="dt.filterGlobal($event.target.value, 'contains')"
                 placeholder="Search jobs..." />
        </p-iconField>
      </div>
    </ng-template>

    <ng-template pTemplate="header">
      <tr>
        <th style="width: 4rem">#</th>
        <th style="min-width: 14rem">
          <div class="flex align-items-center justify-content-between">
            Title
            <p-columnFilter type="text" field="Title" display="menu"></p-columnFilter>
          </div>
        </th>
        <th style="min-width: 10rem">
          <div class="flex align-items-center justify-content-between">
            Department
            <p-columnFilter type="text" field="Department" display="menu"></p-columnFilter>
          </div>
        </th>
        <th style="min-width: 10rem">
          <div class="flex align-items-center justify-content-between">
            Location
            <p-columnFilter type="text" field="Location" display="menu"></p-columnFilter>
          </div>
        </th>
        <th style="min-width: 9rem">
          <div class="flex align-items-center justify-content-between">
            Type
            <p-columnFilter field="EmploymentType" matchMode="equals" display="menu">
              <ng-template pTemplate="filter" let-filter="filterCallback">
                <p-select [options]="[
                    { label: 'All', value: null },
                    { label: 'Full-Time', value: 'Full-Time' },
                    { label: 'Part-Time', value: 'Part-Time' },
                    { label: 'Contract', value: 'Contract' },
                    { label: 'Internship', value: 'Internship' },
                    { label: 'Freelance', value: 'Freelance' }
                  ]"
                  (onChange)="filter($event.value)"
                  placeholder="All">
                </p-select>
              </ng-template>
            </p-columnFilter>
          </div>
        </th>
        <th style="min-width: 8rem">
          <div class="flex align-items-center justify-content-between">
            Status
            <p-columnFilter field="isActive" matchMode="equals" display="menu">
              <ng-template pTemplate="filter" let-filter="filterCallback">
                <p-select [options]="[
                    { label: 'All', value: null },
                    { label: 'Active', value: true },
                    { label: 'Inactive', value: false }
                  ]"
                  (onChange)="filter($event.value)"
                  placeholder="All">
                </p-select>
              </ng-template>
            </p-columnFilter>
          </div>
        </th>
        <th style="width: 8rem">Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-career let-rowIndex="rowIndex">
      <tr>
        <td>{{ (dt.first || 0) + rowIndex + 1 }}</td>
        <td>
          <div class="flex align-items-center gap-3">
            <span class="font-medium">{{ career.Title }}</span>
          </div>
        </td>
        <td>
          <span class="font-medium">{{ career.Department }}</span>
        </td>
        <td>
          <span>{{ career.Location }}</span>
          <span *ngIf="career.IsRemote" class="remote-badge">Remote</span>
        </td>
        <td>
          <p-tag
            [value]="career.EmploymentType"
            [severity]="getTypeSeverity(career.EmploymentType)"
            class="text-sm">
          </p-tag>
        </td>
        <td>
          <p-tag
            [value]="getStatusText(career.MCommonEntitiesMaster.isActive)"
            [severity]="getSeverity(career.MCommonEntitiesMaster.isActive)"
            class="text-sm">
          </p-tag>
        </td>
        <td>
          <div class="flex gap-2">
            <button pButton
                    icon="pi pi-pencil"
                    class="p-button-rounded p-button-text p-button-info"
                    pTooltip="Edit"
                    (click)="editCareer(career)">
            </button>
            <button pButton
                    icon="pi pi-trash"
                    class="p-button-rounded p-button-text p-button-danger"
                    pTooltip="Delete"
                    (click)="deleteCareer(career)">
            </button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="7" class="text-center py-6 text-600">
          <i class="pi pi-briefcase text-4xl mb-3"></i>
          <div class="text-lg">No job postings found</div>
          <p-button label="Add First Job" icon="pi pi-plus" class="mt-3 p-button-success" (click)="openNew()"></p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog [(visible)]="displayDialog" [header]="dialogHeader" [modal]="true"
          [style]="{ width: '90vw', maxWidth: '700px' }" [resizable]="true" [maximizable]="true">
  <form [formGroup]="careerForm" id="careerForm" (ngSubmit)="saveCareer()">
    <div class="container-fluid">
      <input pInputText #inputField formControlName="CareerID" hidden />

      <div class="row mb-3">
        <div class="col-12 col-md-6">
          <label class="form-label fw-medium mb-1">
            Job Title <span class="text-danger">*</span>
          </label>
          <input pInputText
                 #inputField
                 formControlName="Title"
                 class="form-control"
                 [class.is-invalid]="careerForm.get('Title')?.invalid && careerForm.get('Title')?.touched"
                 placeholder="e.g. Senior Frontend Developer" />
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-medium mb-1">
            Department <span class="text-danger">*</span>
          </label>
          <p-select
            #inputField
            formControlName="Department"
            [options]="departmentOptions"
            placeholder="Select Department"
            class="w-full"
            styleClass="w-full">
          </p-select>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-12 col-md-6">
          <label class="form-label fw-medium mb-1">
            Location <span class="text-danger">*</span>
          </label>
          <input pInputText
                 #inputField
                 formControlName="Location"
                 class="form-control"
                 [class.is-invalid]="careerForm.get('Location')?.invalid && careerForm.get('Location')?.touched"
                 placeholder="e.g. Noida, India" />
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-medium mb-1">
            Employment Type <span class="text-danger">*</span>
          </label>
          <p-select
            #inputField
            formControlName="EmploymentType"
            [options]="typeOptions"
            placeholder="Select Type"
            class="w-full"
            styleClass="w-full">
          </p-select>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-12 col-md-4">
          <label class="form-label fw-medium mb-1">
            Experience Level <span class="text-danger">*</span>
          </label>
          <p-select
            #inputField
            formControlName="ExperienceLevel"
            [options]="levelOptions"
            placeholder="Select Level"
            class="w-full"
            styleClass="w-full">
          </p-select>
        </div>
        <div class="col-6 col-md-2">
          <label class="form-label fw-medium mb-1">Min Exp (Yrs)</label>
          <p-inputNumber
            #inputField
            formControlName="MinExperience"
            [min]="0"
            [max]="50"
            class="w-full">
          </p-inputNumber>
        </div>
        <div class="col-6 col-md-2">
          <label class="form-label fw-medium mb-1">Max Exp (Yrs)</label>
          <p-inputNumber
            #inputField
            formControlName="MaxExperience"
            [min]="0"
            [max]="50"
            class="w-full">
          </p-inputNumber>
        </div>
        <div class="col-12 col-md-4">
          <label class="form-label fw-medium mb-1">Salary Range</label>
          <input pInputText
                 #inputField
                 formControlName="SalaryRange"
                 class="form-control"
                 placeholder="e.g. 12-18 LPA" />
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-12">
          <label class="form-label fw-medium mb-1">
            Description <span class="text-danger">*</span>
          </label>
          <textarea pInputTextarea
                    #inputField
                    formControlName="Description"
                    class="form-control"
                    rows="3"
                    placeholder="Brief description of the role..."></textarea>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-12 col-md-6">
          <label class="form-label fw-medium mb-1">Requirements</label>
          <textarea pInputTextarea
                    #inputField
                    formControlName="Requirements"
                    class="form-control"
                    rows="4"
                    placeholder="Key requirements (one per line)..."></textarea>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label fw-medium mb-1">Responsibilities</label>
          <textarea pInputTextarea
                    #inputField
                    formControlName="Responsibilities"
                    class="form-control"
                    rows="4"
                    placeholder="Key responsibilities (one per line)..."></textarea>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-12 col-md-6">
          <label class="form-label fw-medium mb-1">Benefits</label>
          <textarea pInputTextarea
                    #inputField
                    formControlName="Benefits"
                    class="form-control"
                    rows="3"
                    placeholder="Benefits offered..."></textarea>
        </div>
        <div class="col-12 col-md-6">
          <div class="row">
            <div class="col-12">
              <label class="form-label fw-medium mb-1">Application URL</label>
              <input pInputText
                     #inputField
                     formControlName="ApplicationUrl"
                     class="form-control"
                     placeholder="https://..." />
            </div>
            <div class="col-12 mt-3">
              <label class="form-label fw-medium mb-1">Application Deadline</label>
              <p-datepicker
                #inputField
                formControlName="ApplicationDeadline"
                class="w-full"
                styleClass="w-full"
                [showIcon]="true"
                placeholder="Select deadline">
              </p-datepicker>
            </div>
          </div>
        </div>
      </div>

      <div class="row mb-3 align-items-center">
        <div class="col-4">
          <label class="form-label fw-medium mb-1">Sort Order</label>
          <p-inputNumber
            formControlName="SortOrder"
            [min]="0"
            class="w-full">
          </p-inputNumber>
        </div>
        <div class="col-4 d-flex align-items-center gap-3" formGroupName="MCommonEntitiesMaster">
          <label class="form-label fw-medium mb-0 me-2">Status</label>
          <p-toggleswitch formControlName="isActive"></p-toggleswitch>
          <span>{{ careerForm.get('MCommonEntitiesMaster.isActive')?.value ? 'Active' : 'Inactive' }}</span>
        </div>
        <div class="col-4 d-flex align-items-center gap-2">
          <label class="form-label fw-medium mb-0">Remote</label>
          <p-toggleswitch formControlName="IsRemote"></p-toggleswitch>
        </div>
      </div>
    </div>
  </form>
  <ng-template pTemplate="footer">
    <button type="button" pButton label="Cancel" icon="pi pi-times" class="p-button-text" (click)="displayDialog = false">
    </button>
    <button type="submit" pButton label="Save Job" icon="pi pi-check" [loading]="saving"
            [disabled]="careerForm.invalid" class="p-button-success" form="careerForm">
    </button>
  </ng-template>
</p-dialog>

<p-confirmDialog key="careerDialog"></p-confirmDialog>
