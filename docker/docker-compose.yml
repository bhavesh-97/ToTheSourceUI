version: '3.9'

services:

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile

    container_name: totsource_frontend

    restart: unless-stopped

  backend:
    build:
      context: ../../backend/ToTheSourceAPI
      dockerfile: Dockerfile

    container_name: totsource_api

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

    restart: unless-stopped

  nginx:
    image: nginx:alpine

    container_name: totsource_nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - frontend
      - backend

    restart: unless-stopped
